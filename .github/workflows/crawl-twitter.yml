name: Crawl Twitter Images

on:
  schedule:
    # Run daily at UTC 04:00
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    environment: env

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache gallery-dl archive
        uses: actions/cache@v4
        with:
          path: scripts/.gallery-dl-archive.db
          key: gallery-dl-archive-v2-${{ github.run_id }}
          restore-keys: |
            gallery-dl-archive-v2-

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install gallery-dl
        run: pip install gallery-dl

      - name: Run Twitter crawl script
        env:
          TWITTER_COOKIES: ${{ secrets.TWITTER_COOKIES }}
          SITE_URL: ${{ secrets.SITE_URL }}
          CRAWL_API_KEY: ${{ secrets.CRAWL_API_KEY }}
        run: node scripts/crawl-twitter.mjs
