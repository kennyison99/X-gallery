name: Crawl Twitter Images

on:
  schedule:
    # Run daily at UTC 04:00
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      crawl_all:
        description: 'Crawl all historical images (ignores the latest-only limit)'
        required: false
        type: boolean
        default: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    environment: env

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache xtractor binary
        uses: actions/cache@v4
        with:
          path: scripts/.xtractor-bin
          key: xtractor-bin-v1.1-${{ github.run_id }}
          restore-keys: |
            xtractor-bin-v1.1-

      - name: Cache xtractor dedup archive
        uses: actions/cache@v4
        with:
          path: scripts/.xtractor-archive.json
          key: xtractor-archive-v1-${{ github.run_id }}
          restore-keys: |
            xtractor-archive-v1-

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Pillow
        run: pip install Pillow

      - name: Ensure ffmpeg is available
        # ubuntu-latest ships with ffmpeg; this is a safety net for converting
        # animated_gif (mp4) to animated WebP.
        run: |
          if ! command -v ffmpeg >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y ffmpeg
          fi
          ffmpeg -version | head -n 1

      - name: Run Twitter crawl script
        env:
          TWITTER_COOKIES: ${{ secrets.TWITTER_COOKIES }}
          SITE_URL: ${{ secrets.SITE_URL }}
          CRAWL_API_KEY: ${{ secrets.CRAWL_API_KEY }}
          CRAWL_RUN_TYPE: ${{ github.event_name == 'schedule' && 'auto' || 'manual' }}
        run: |
          if [ "${{ github.event.inputs.crawl_all }}" = "true" ]; then
            node scripts/crawl-twitter.mjs --all
          else
            node scripts/crawl-twitter.mjs
          fi
