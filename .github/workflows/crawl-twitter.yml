name: Crawl Twitter Images

on:
  schedule:
    # Run daily at UTC 04:00
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      crawl_all:
        description: 'Crawl all historical images (ignores the latest-only limit)'
        required: false
        type: boolean
        default: false
      fix_links:
        description: 'Run post links repair script to fix rounded tweet IDs'
        required: false
        type: boolean
        default: false
      dedup_media:
        description: 'Scan and remove duplicate R2 objects within image records'
        required: false
        type: boolean
        default: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    environment: env

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache xtractor binary
        uses: actions/cache@v4
        with:
          path: scripts/.xtractor-bin
          key: xtractor-bin-v1.1-${{ github.run_id }}
          restore-keys: |
            xtractor-bin-v1.1-

      - name: Cache xtractor dedup archive
        uses: actions/cache@v4
        with:
          path: scripts/.xtractor-archive.json
          key: xtractor-archive-v1-${{ github.run_id }}
          restore-keys: |
            xtractor-archive-v1-

      - name: Set up Python 3.12
        if: ${{ github.event.inputs.fix_links != 'true' && github.event.inputs.dedup_media != 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Pillow
        if: ${{ github.event.inputs.fix_links != 'true' && github.event.inputs.dedup_media != 'true' }}
        run: pip install Pillow

      - name: Set up FFmpeg
        if: ${{ github.event.inputs.fix_links != 'true' && github.event.inputs.dedup_media != 'true' }}
        uses: federicocarboni/setup-ffmpeg@v3

      - name: Run Twitter crawl script
        if: ${{ github.event.inputs.fix_links != 'true' && github.event.inputs.dedup_media != 'true' }}
        env:
          TWITTER_COOKIES: ${{ secrets.TWITTER_COOKIES }}
          SITE_URL: ${{ secrets.SITE_URL }}
          CRAWL_API_KEY: ${{ secrets.CRAWL_API_KEY }}
          CRAWL_RUN_TYPE: ${{ github.event_name == 'schedule' && 'auto' || 'manual' }}
        run: |
          if [ "${{ github.event.inputs.crawl_all }}" = "true" ]; then
            node scripts/crawl-twitter.mjs --all
          else
            node scripts/crawl-twitter.mjs
          fi

      - name: Run links repair script
        if: ${{ github.event.inputs.fix_links == 'true' }}
        env:
          TWITTER_COOKIES: ${{ secrets.TWITTER_COOKIES }}
          SITE_URL: ${{ secrets.SITE_URL }}
          CRAWL_API_KEY: ${{ secrets.CRAWL_API_KEY }}
        run: |
          npm run fix-links

      - name: Run duplicate media scan and repair
        if: ${{ github.event.inputs.dedup_media == 'true' }}
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRAWL_API_KEY: ${{ secrets.CRAWL_API_KEY }}
        run: |
          npm run dedup-media -- --apply

      - name: Run daily cleanup for pending review images
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -n "$SITE_URL" ] && [ -n "$CRON_SECRET" ]; then
            echo "Triggering daily cleanup..."
            curl -X POST "${SITE_URL}/api/cron-cleanup" \
              -H "Content-Type: application/json" \
              -H "X-Cron-Secret: ${CRON_SECRET}"
          else
            echo "Skipping cleanup: SITE_URL or CRON_SECRET is not configured in GitHub Secrets"
          fi
